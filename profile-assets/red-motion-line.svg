<svg width="1200" height="18" viewBox="0 0 1200 18" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="sweep" x1="0" y1="0" x2="1200" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#1F2937" stop-opacity="0"/>
      <stop offset="0.18" stop-color="#FF1744" stop-opacity="0.25"/>
      <stop offset="0.5" stop-color="#FF1744"/>
      <stop offset="0.82" stop-color="#FF1744" stop-opacity="0.25"/>
      <stop offset="1" stop-color="#1F2937" stop-opacity="0"/>
      <animateTransform attributeName="gradientTransform" type="translate" values="-1200 0;1200 0;-1200 0" dur="4s" repeatCount="indefinite"/>
    </linearGradient>
    <filter id="glow" x="-10%" y="-200%" width="120%" height="500%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect x="0" y="8" width="1200" height="2" rx="1" fill="#2A0F1F"/>
  <rect x="0" y="7" width="1200" height="4" rx="2" fill="url(#sweep)" filter="url(#glow)"/>
</svg>
